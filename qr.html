<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR code - Bon pour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #fffcdc;
        --paper: #ece1cb;
        --teal: #1e786a;
        --teal-light: #38a594;
        --clay: #c35d54;
        --ink: #5b4942;
        --white: #ffffff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Montserrat", Arial, sans-serif;
        color: var(--ink);
        background: linear-gradient(160deg, var(--paper), #fff 38%, var(--cream));
        display: grid;
        place-items: center;
        padding: 1.2rem;
      }

      .sheet {
        position: relative;
        width: min(620px, 100%);
        background: var(--white);
        border: 3px solid var(--teal);
        border-radius: 24px;
        padding: 1.2rem;
        box-shadow: 0 15px 35px rgba(7, 80, 69, 0.2);
      }

      .mini-icon {
        position: absolute;
        right: 0.85rem;
        top: 0.85rem;
        width: 62px;
        height: 62px;
        object-fit: contain;
        border-radius: 999px;
        background: linear-gradient(145deg, var(--paper), var(--cream));
        border: 2px solid var(--teal-light);
        padding: 0.32rem;
      }

      .logo {
        width: 220px;
        max-width: 100%;
        display: block;
        margin: 0 auto 0.8rem;
        background: var(--teal);
        border-radius: 10px;
        padding: 0.35rem 0.5rem;
      }

      h1 {
        margin: 0;
        text-align: center;
        color: var(--teal);
        font-size: 1.45rem;
      }

      p {
        text-align: center;
        margin: 0.6rem 0 1rem;
      }

      .qr-wrap {
        margin: 0 auto;
        width: min(360px, 88vw);
        padding: 1rem;
        border: 2px dashed var(--clay);
        border-radius: 18px;
        background: var(--cream);
      }

      .qr {
        width: 100%;
        display: block;
        border-radius: 12px;
      }

      .url {
        font-size: 0.85rem;
        color: var(--teal);
        word-break: break-all;
      }

      .actions {
        margin-top: 1rem;
        display: flex;
        gap: 0.6rem;
      }

      input {
        flex: 1;
        border: 2px solid var(--teal-light);
        border-radius: 10px;
        padding: 0.55rem 0.75rem;
        font-size: 0.92rem;
      }

      button {
        border: 0;
        border-radius: 10px;
        background: var(--teal);
        color: var(--white);
        font-weight: 700;
        padding: 0.55rem 0.9rem;
        cursor: pointer;
      }

      .print {
        width: 100%;
        margin-top: 0.7rem;
        background: var(--clay);
      }

      @media print {
        body { background: #fff; padding: 0; }
        .sheet { box-shadow: none; border-width: 2px; }
        .logo {
          background: transparent;
          padding: 0;
          border-radius: 0;
          filter: brightness(0) saturate(100%) invert(30%) sepia(20%) saturate(1068%) hue-rotate(122deg) brightness(96%) contrast(92%);
        }
        .actions { display: none; }
        .print { display: none; }
        .url { display: none; }
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <img class="mini-icon" src="assets/icon-dartgil.png" alt="" aria-hidden="true" />
      <img class="logo" src="assets/logo-dartgil-blanc.png" alt="Logo D'ART'gil Café" />
      <h1>Flashez pour découvrir</h1>
      <p class="url" id="current-url"></p>

      <div class="qr-wrap">
        <img id="qr" class="qr" alt="QR code du bon pour" />
      </div>

      <div class="actions">
        <input id="target" type="url" value="https://killian31.github.io/bonpour/" />
        <button id="update" type="button">Mettre à jour</button>
      </div>
      <button class="print" type="button" onclick="window.print()">Imprimer</button>
    </main>

    <script>
      const qrImg = document.getElementById('qr');
      const targetInput = document.getElementById('target');
      const currentUrl = document.getElementById('current-url');
      const updateBtn = document.getElementById('update');

      function buildQrSrc(url) {
        const params = new URLSearchParams({
          text: url,
          dark: '1E786A',
          light: 'FFFCDC',
          ecLevel: 'H',
          margin: '2',
          size: '900',
        });
        return `https://quickchart.io/qr?${params.toString()}`;
      }

      function refreshQr() {
        const url = targetInput.value.trim();
        if (!url) return;
        currentUrl.textContent = url;
        qrImg.src = buildQrSrc(url);
      }

      updateBtn.addEventListener('click', refreshQr);
      targetInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') refreshQr();
      });

      refreshQr();
    </script>
  </body>
</html>
